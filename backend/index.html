<!DOCTYPE html>
<html>
<head>
  <title>Chat App</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    h2 {
      color: #333;
    }

    #chat {
      height: 350px;
      width: 80%;
      margin: auto;
      overflow-y: scroll;
      border: 1px solid #ccc;
      background: white;
      padding: 10px;
      margin-bottom: 10px;
    }

    input {
      padding: 10px;
      width: 60%;
    }

    button {
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

<h2>💬 Chat App</h2>

<div id="chat"></div>

<input id="message" placeholder="Type message..." />
<button onclick="sendMessage()">Send</button>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
  // 🔥 REPLACE WITH YOUR ACTUAL RENDER URL
  const socket = io("https://your-app.onrender.com");

  const chat = document.getElementById("chat");
  let username = "";

  // Ask username
  socket.on("connect", () => {
    username = prompt("Enter your name:");
    socket.emit("user joined", { name: username });
  });

  // Receive messages (correct event)
  socket.on("room message", (msg) => {
    const p = document.createElement("p");
    p.innerText = msg.sender + ": " + msg.text;
    chat.appendChild(p);
    chat.scrollTop = chat.scrollHeight;
  });

  // Send message (correct event)
  function sendMessage() {
    const input = document.getElementById("message");

    if (input.value.trim() === "") return;

    socket.emit("room message", { text: input.value });

    input.value = "";
  }
</script>

</body>
</html>
