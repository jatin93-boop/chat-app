<!DOCTYPE html>
<html>
<head>
  <title>Chat App</title>
  <style>
    body { font-family: Arial; text-align: center; }
    #chat { height: 300px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
    input { padding: 10px; width: 70%; }
    button { padding: 10px; }
  </style>
</head>
<body>

<h2>💬 Chat App</h2>

<div id="chat"></div>

<input id="message" placeholder="Type message..." />
<button onclick="sendMessage()">Send</button>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
  // 🔥 PUT YOUR RENDER URL HERE
  const socket = io("https://your-app.onrender.com");

  const chat = document.getElementById("chat");

  socket.on("connect", () => {
    const name = prompt("Enter your name:");
    socket.emit("user joined", { name: name });
  });

  socket.on("chat message", (msg) => {
    const p = document.createElement("p");
    p.innerText = msg.sender + ": " + msg.text;
    chat.appendChild(p);
    chat.scrollTop = chat.scrollHeight;
  });

  function sendMessage() {
    const input = document.getElementById("message");
    socket.emit("chat message", { text: input.value });
    input.value = "";
  }
</script>

</body>
</html>
