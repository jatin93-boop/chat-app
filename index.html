<!DOCTYPE html>
<html>
<head>
  <title>Pulse Chat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f3f5f7;
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 300px;
      background: #1e6f5c;
      color: white;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 20px;
    }

    .profile {
      background: #2e8b75;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .profile input {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
    }

    .profile button {
      margin-top: 10px;
      padding: 8px;
      width: 100%;
      background: #0f3d2e;
      color: white;
      border: none;
    }

    .room {
      background: white;
      color: black;
      padding: 10px;
      border-radius: 10px;
    }

    /* Chat Area */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      padding: 15px;
      background: white;
      border-bottom: 1px solid #ccc;
      font-size: 20px;
      font-weight: bold;
    }

    .chat-box {
      flex: 1;
      padding: 15px;
      overflow-y: scroll;
    }

    .message {
      margin: 5px 0;
      padding: 8px;
      background: #e6f2ef;
      border-radius: 5px;
      width: fit-content;
    }

    .chat-input {
      display: flex;
      padding: 10px;
      background: white;
      border-top: 1px solid #ccc;
    }

    .chat-input input {
      flex: 1;
      padding: 10px;
    }

    .chat-input button {
      padding: 10px;
      margin-left: 5px;
      background: #1e6f5c;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>Pulse Chat</h2>

  <div class="profile">
    <div>Name:</div>
    <input id="username" placeholder="Enter name" />
    <button onclick="saveProfile()">Save</button>
  </div>

  <div class="room">
    Room: LOBBY
  </div>
</div>

<!-- Chat -->
<div class="chat-container">
  <div class="chat-header">Room Chat</div>

  <div id="chat" class="chat-box"></div>

  <div class="chat-input">
    <input id="message" placeholder="Type message..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
  const socket = io();

  const chat = document.getElementById("chat");
  let username = "Anonymous";

  function saveProfile() {
    const input = document.getElementById("username");
    username = input.value || "Anonymous";

    socket.emit("user joined", {
      name: username,
      roomCode: "LOBBY"
    });
  }

  socket.on("room history", (messages) => {
    messages.forEach(addMessage);
  });

  socket.on("room message", (msg) => {
    addMessage(msg);
  });

  function addMessage(msg) {
    const div = document.createElement("div");
    div.className = "message";
    div.innerText = msg.sender + ": " + msg.text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function sendMessage() {
    const input = document.getElementById("message");

    if (!input.value.trim()) return;

    socket.emit("room message", {
      text: input.value
    });

    input.value = "";
  }
</script>

</body>
</html>
